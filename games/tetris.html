<!DOCTYPE html>
<html>

<head>
  <title>Shuflduf.xyz</title>
  <link rel="icon" href="/assets/favicon.png">
  <link rel="stylesheet" href="/css/fun.css">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/tetris.js"></script>
  <script src="/js/srs.js"></script>
</head>

<body>
  <h1 class="page-title">Shuflduf</h1>
  <div id="navbar-include"></div>
  <div class="content">
    <div id="navlinks-include"></div>
    <div class="section main">
      <h1>Tetris</h1>
      <p>If the game is too big, zoom out using Ctrl+-</p>
      <canvas id="game"></canvas>
    </div>
    <aside class="sidebar">
      <div class="section top-right">
        <h1>Next</h1>
        <canvas id="next"></canvas>
      </div>
      <div class="section">
        <h1>Held</h1>
        <canvas id="held"></canvas>
      </div>
      <div class="section">
        <h1>Score</h1>
        <p id="score">Score: 0</p>
        <p id="highscore">High Score: 0</p>
      </div>
      <div class="section">
        <h1>Controls</h1>
        <ul>
          <li id="c-left">Left: A</li>
          <li id="c-right">Right: D</li>
          <li id="c-clockwise">Clockwise: →</li>
          <li id="c-counterclockwise">Counter-Clockwise: ←</li>
          <li id="c-softdrop">Soft Drop: W</li>
          <li id="c-harddrop">Hard Drop: S</li>
          <li id="c-hold">Hold: LShift</li>
        </ul>
      </div>
      <div class="section bottom-right">
        <h1>Settings</h1>
        <button id="reset">Reset Game</button>
        <select id="keybinds">
          <option value="WASD">
            TETR.IO WASD
          </option>
          <option value="ArrowKeys">
            TETR.IO Arrow Keys
          </option>
        </select>

        <br>
        <label for="width">Width</label>
        <input type="number" id="width" value=10 min=4 max=20>
      </div>
    </aside>
  </div>
</body>


</html>
