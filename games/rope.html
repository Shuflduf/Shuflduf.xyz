<!DOCTYPE html>
<html>

<head>
  <title>Shuflduf.xyz</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="/js/init.js"></script>
  <script src="/js/rope.js"></script>

  <link rel="icon" href="/assets/favicon.png">
  <link rel="stylesheet" href="/css/global.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <h1 class="page-title">Shuflduf</h1>
  <div id="navbar-include"></div>
  <div class="content">
    <div id="navlinks-include"></div>
    <div class="section main">
      <h1>Rope Physics</h1>
      <canvas id="rope" height=500></canvas>
    </div>
    <aside class="sidebar">
      <div class="section top-right">
        <h1>Options</h1>
        <label for="length">Length</label>
        <input type="number" id="length" value=400>
        <label for="resolution">Resolution</label>
        <input type="number" id="resolution" value=15>
        <label for="stiffness">Stiffness</label>
        <input type="number" id="stiffness" value=80>
        <button id="reset">Reset</button>
      </div>
      <div class="section">
        <h1>Instructions</h1>
        <ul>
          <li>Click on the canvas to drag the end of the rope</li>
          <li>Throw it around and stuff</li>
          <li>Try resizing the window!</li>
          <li>Change its paramaters above</li>
        </ul>
      </div>
    </aside>
  </div>
</body>


</html>
